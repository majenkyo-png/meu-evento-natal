{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Área restrita (Administrador)</h2>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">{{ form.senha.label }} {{ form.senha(class="form-control") }}</div>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
