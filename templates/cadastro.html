{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Cadastro de Participante</h2>
        <form method="POST">
            <div class="mb-3">
                <label>Nome completo</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>E-mail</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Telefone (WhatsApp)</label>
                <input type="text" name="telefone" class="form-control">
            </div>
            <div class="mb-3">
                <label>Sua idade</label>
                <input type="number" name="idade" class="form-control" required min="0" max="120">
                <small class="text-muted">Usada para definir o valor das parcelas</small>
            </div>
            <div class="mb-3">
                <label>Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </form>
        <p class="mt-3">Já tem conta? <a href="{{ url_for('login') }}">Faça login</a></p>
    </div>
</div>
{% endblock %}
